name: Sync upstream main

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/EasyTier/EasyTier.git || true
          git fetch upstream main

      - name: Sync main with upstream/main
        run: |
          git checkout main
          git merge --ff-only upstream/main

      - name: Push changes
        run: |
          git push origin main

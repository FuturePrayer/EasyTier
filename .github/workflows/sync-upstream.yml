name: Sync upstream main

on:
  schedule:
    # 每天 UTC 01:00，同步一次；北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/EasyTier/EasyTier.git || true
          git fetch upstream main --tags

      - name: Check whether fork is behind upstream
        id: check
        run: |
          LOCAL_SHA="$(git rev-parse main)"
          UPSTREAM_SHA="$(git rev-parse upstream/main)"
          echo "local_sha=$LOCAL_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fast-forward main to upstream/main
        if: steps.check.outputs.needs_sync == 'true'
        run: |
          git checkout main
          git merge --ff-only upstream/main

      - name: Push main
        if: steps.check.outputs.needs_sync == 'true'
        run: |
          git push origin main

      - name: No changes
        if: steps.check.outputs.needs_sync != 'true'
        run: |
          echo "Fork main is already up to date with upstream/main"
